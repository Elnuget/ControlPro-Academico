services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-controlpro}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-controlpro_dev}
    ports:
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 8s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  project-service:
    build: ./apps/project-service
    environment:
      PORT: 3001
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-controlpro}
      DB_USER: ${MYSQL_USER:-controlpro_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-controlpro_dev}
      REDIS_URL: redis://redis:6379
      AMQP_URL: amqp://${RABBITMQ_DEFAULT_USER:-controlpro}:${RABBITMQ_DEFAULT_PASS:-controlpro_dev}@rabbitmq:5672
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  alert-function:
    build: ./apps/alert-function
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-controlpro}
      DB_USER: ${MYSQL_USER:-controlpro_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-controlpro_dev}
      AMQP_URL: amqp://${RABBITMQ_DEFAULT_USER:-controlpro}:${RABBITMQ_DEFAULT_PASS:-controlpro_dev}@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build: ./apps/api-gateway
    environment:
      PORT: 3000
      PROJECT_SERVICE_URL: http://project-service:3001
      JWT_SECRET: ${JWT_SECRET:-controlpro-local-demo-secret}
    ports:
      - "3000:3000"
    depends_on:
      - project-service
    restart: unless-stopped

volumes:
  redis_data:
